apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aquavis12/velero-gitops.git
    targetRevision: main
    path: clusters/primary
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
